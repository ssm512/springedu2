<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>방명록 목록</title>
    <link rel="stylesheet" href="/css/visitor.css">
    <style>
        table{
            margin: 5px auto;
        }
        td {
            border-bottom: 1px dotted black;
            padding: 10px;
            text-align: left;
        }
        tr:hover {
            background-color: pink;
        }
        td:nth-of-type(1) {width: 80px;}
        td:nth-of-type(2) {width: 120px;}
        div {
            margin: 10px auto;
            padding: 50px;
            background: linear-gradient(to bottom, #33ccff 0%, #ff99cc 100%);
            width: 800px;
            border-radius: 5px;
        }
        .icon-button{
            border: 0;
            background: transparent;
            cursor: pointer;
            padding: 0;
        }
    </style>
</head>
<body>
    <h1>방명록 글 리스트</h1>
    <hr>
    <div>
        <table th:if="${vList}">
            <tr th:each="vo : ${vList}">
                <!--<td>[[${vo.name}]]</td>-->
                <td th:text="${vo.name}"></td>
                <td>[[${vo.writeDate}]]</td>
                <td>[[${vo.memo}]]</td>
                <td>
                    <form th:action="@{/vdelete}" method="post"
                    onsubmit="return confirm('삭제하시겠습니까?')">
                        <input type="hidden" name="id" th:value="${vo.id}"/>
                        <button type="submit" class="icon-button">
                            <img src="/image/delete.png" width="30" alt="삭제" />
                        </button>
                    </form>
                </td>
                <td>
                    <img src="/image/edit.png" width="30" alt="수정"
                        th:onclick="|displayUpdateForm(${vo.id})|" />
                    <!-- onclick 자바 스크립트로 동작함,
                     th:onclick="displayUpdateForm([[${vo.id}]])" 이것도 잘 됨-->
                </td>
            </tr>
        </table>
        <h3 th:if="${msg}" th:text="${msg}"></h3>
        <hr>
        <a href="/visitorMain.html"><button>메인페이지로 돌아가기</button></a>
    </div>

    <div id="updateForm" style="display:none">
        <h2>글을 수정하세요</h2>
        <hr>
        <form method="post" action="/vupdate">
            <input type="hidden" name="id" value=""/>
            <input type="text" name="name" value="" placeholder="이름" required/><br>
            <textarea name="memo" rows="10" cols="35" required></textarea><br>
            <input type="submit" value="수정" />
            <input type="reset" value="재작성" onclick="resetForm(); return false" />
            <input type="button" value="취소" onclick="document.getElementById('updateForm').style.display='none'"/>
        </form>
    </div>

    <script>
        var idEl      =   null;
        var nameEl    =   null;
        var memoEl    =   null;
        var prevData  =   null;
        // 수정버튼클릭
        function displayUpdateForm( id ) {
            // 서버의 정보 id로 조회 (fetch)
            fetch("/one?id=" + id)
                .then( response => {
                    if ( !response.ok ){
                        throw new Error("방명록을 찾을 수 없습니다.")
                    }
                    return response.json();
                })
                .then( data => {
                    console.log(data)
                    prevData        =   data
                    idEl            =   document.querySelector('[name=id]')
                    nameEl          =   document.querySelector('[name=name]')
                    memoEl          =   document.querySelector('[name=memo]')
                    idEl.value      =   data.id;
                    nameEl.value    =   data.name;
                    memoEl.value    =   data.memo;
                })
                .catch( error => alert(error.message) );
            document.getElementById('updateForm').style.display='block'
        }
        function resetForm() {
            idEl.value          =   prevData.id;
            nameEl.value        =   prevData.name;
            memoEl.value        =   prevData.memo;
        }
    </script>
</body>
</html>
